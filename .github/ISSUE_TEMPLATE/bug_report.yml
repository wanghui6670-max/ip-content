name: Bug report
description: 报告构建、部署、同步、UI 或数据模式相关问题
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 简要说明你遇到的问题
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 所属区域
      options:
        - web-dashboard
        - content-domain
        - feishu-sync
        - ip-cli
        - ci / deployment
        - docs
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请按顺序写清楚如何复现
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: 附加信息
      description: 可补充截图、日志、commit、deployment 链接等

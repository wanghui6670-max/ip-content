name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-domain:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run content-domain tests
        working-directory: packages/content-domain
        run: npm test

  validate-sync:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run feishu-sync tests
        working-directory: packages/feishu-sync
        run: npm test

  build-web:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web-dashboard/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install web dependencies
        working-directory: apps/web-dashboard
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run web-dashboard tests
        working-directory: apps/web-dashboard
        run: npm test

      - name: Build web app
        run: npm run build:web

      - name: Verify dist output
        run: test -f apps/web-dashboard/dist/index.html
